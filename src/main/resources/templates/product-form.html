<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Ürün Formu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- CSRF -->
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}">
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}">

    <style>
        body { background:#0d0f12; color:#fff; }
        .card{ background:rgba(20,22,27,.92); border:1px solid rgba(255,255,255,.08); border-radius:16px }
        .form-label{ color:#fff; font-weight:700 }
        .form-control,.form-select{ background:rgba(255,255,255,.06); color:#fff; border:1px solid rgba(255,255,255,.22) }
        .btn-accent{ background:linear-gradient(90deg,#ff4d4d,#cc1f1f); border:none; color:#fff; font-weight:700; border-radius:12px }
        .section-title{ font-weight:800; margin-top:1rem; }
        .hint{ color:#b7c0cf; font-size:.9rem }
        .d-none-force{ display:none !important; }
    </style>
</head>
<body>
<div class="container py-4 py-md-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="m-0 fw-bold" th:text="${product.productId != null ? 'Ürün Düzenle' : 'Yeni Ürün'}">Yeni Ürün</h3>
        <a th:href="@{/products}" class="btn btn-outline-light">Listeye Dön</a>
    </div>

    <div class="card p-4">

        <form th:action="@{/products/save}" method="post" th:object="${product}">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- ID (edit için) -->
            <input type="hidden" th:field="*{productId}"/>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Provider</label>
                    <input class="form-control" th:field="*{provider}" placeholder="örn. İsdemir"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Material</label>
                    <input class="form-control" th:field="*{material}" placeholder="örn. çelik"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <input class="form-control" th:field="*{status}" placeholder="örn. stokta var"/>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Type</label>
                    <!-- productType: hot_coil | cold_coil | plates -->
                    <select id="typeSelect" class="form-select" th:field="*{productType}">
                        <option value="">Seçiniz</option>
                        <option value="hot_coil">hot_coil</option>
                        <option value="cold_coil">cold_coil</option>
                        <option value="plates">plates</option>
                    </select>
                    <div class="hint">Seçime göre aşağıdaki alanlar aktif olur.</div>
                </div>
            </div>

            <!-- HOT COIL -->
            <div id="hotSection" class="mt-4">
                <div class="section-title">Hot Coil</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Tensile</label>
                        <input class="form-control" name="hotTensileStr" type="number" placeholder="örn. 450"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Elongation</label>
                        <input class="form-control" name="hotElongation" type="number" placeholder="örn. 22"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Thickness</label>
                        <input class="form-control" name="hotThickness" type="number" placeholder="örn. 5"/>
                    </div>
                </div>
            </div>

            <!-- COLD COIL -->
            <div id="coldSection" class="mt-4">
                <div class="section-title">Cold Coil</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Yield</label>
                        <input class="form-control" name="coldYieldStr" type="number" placeholder="örn. 280"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Elongation</label>
                        <input class="form-control" name="coldElongation" type="number" placeholder="örn. 28"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Thickness</label>
                        <input class="form-control" name="coldThickness" type="number" placeholder="örn. 2"/>
                    </div>
                </div>
            </div>

            <!-- PLATES -->
            <div id="plateSection" class="mt-4">
                <div class="section-title">Plates</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Thickness</label>
                        <input class="form-control" name="plateThickness" type="number" placeholder="örn. 10"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Length</label>
                        <input class="form-control" name="plateLength" type="number" placeholder="örn. 6000"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Width</label>
                        <input class="form-control" name="plateWidth" type="number" placeholder="örn. 2000"/>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-accent" type="submit">Kaydet</button>
                <a th:href="@{/products}" class="btn btn-outline-light">İptal</a>
            </div>
        </form>
    </div>
</div>

<script>
    (function(){
        const sel   = document.getElementById('typeSelect');
        const hot   = document.getElementById('hotSection');
        const cold  = document.getElementById('coldSection');
        const plate = document.getElementById('plateSection');

        function setEnabled(container, enabled){
            if (!container) return;
            container.querySelectorAll('input,select,textarea,button').forEach(el=>{
                el.disabled = !enabled;
            });
            container.classList.toggle('d-none-force', !enabled);
        }

        function updateSections(){
            const t = (sel.value || '').toLowerCase();
            setEnabled(hot,   t === 'hot_coil');
            setEnabled(cold,  t === 'cold_coil');
            setEnabled(plate, t === 'plates');
        }

        sel.addEventListener('change', updateSections);
        updateSections();
    })();
</script>
</body>
</html>
