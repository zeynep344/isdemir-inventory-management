<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - İsdemir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{
            --bg:#0c0d10; --card:#16181f; --accent:#22252f; --muted:#9aa0ab; --white:#fff;
            --red:#e11d2e; --red-2:#b3121f; --shadow:0 24px 60px rgba(0,0,0,.55); --radius:16px;
            --input:#10131a; --input-b:#2a3042;
        }
        html,body{ height:100%; background:var(--bg); color:var(--white); }
        .wrap{ min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
        .cardx{
            width:100%; max-width:440px; background:var(--card); border:1px solid var(--accent);
            border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
        }
        .head{ padding:22px 24px; border-bottom:1px solid var(--accent); }
        .title{ font-weight:800; font-size:22px; }
        .body{ padding:22px 24px 24px; }
        .form-label{ color:#e8ecf6; font-weight:600; }
        .form-control{
            background:var(--input); color:#fff; border:1px solid var(--input-b);
            border-radius:12px; padding:.7rem .9rem;
        }
        .form-control:focus{ border-color:#3a4260; box-shadow:none; }
        .btn-red{
            width:100%; border:0; border-radius:12px; padding:.75rem 1rem; font-weight:800;
            background:linear-gradient(180deg,var(--red),var(--red-2)); color:#fff;
            box-shadow:0 10px 20px rgba(225,29,46,.35);
        }
        .muted{ color:#9aa0ab; }
        .alert-err{ background:rgba(225,29,46,.12); border:1px solid rgba(225,29,46,.35); color:#ff9aa3; }
        a{ color:#ff9aa3; text-decoration:none; } a:hover{text-decoration:underline;}
        .foot{ padding:12px 24px 18px; text-align:center; color:#9aa0ab; font-size:.85rem; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="cardx">
        <div class="head"><div class="title">İsdemir Giriş</div></div>

        <div class="body">
            <!-- Mesajlar -->
            <div th:if="${param.error}" class="alert alert-err mb-3">Kullanıcı adı veya şifre hatalı.</div>
            <div th:if="${param.logout}" class="alert mb-3" style="background:rgba(46,204,113,.12); border:1px solid rgba(46,204,113,.3); color:#8ef0b0;">
                Çıkış yapıldı.
            </div>
            <div th:if="${ok}" class="alert alert-success mb-3" th:text="${ok}"></div>

            <!-- ÖNEMLİ: action=/perform_login, name="username" & name="pass" -->
            <form th:action="@{/perform_login}" method="post" novalidate>
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="username" class="form-label">Kullanıcı Adı</label>
                    <input id="username" name="username" class="form-control" autocomplete="username" required>
                </div>

                <div class="mb-4">
                    <label for="pass" class="form-label">Şifre</label>
                    <input id="pass" name="pass" type="password" class="form-control" autocomplete="current-password" required>
                </div>

                <button class="btn-red" type="submit">Giriş Yap</button>
            </form>

            <div class="text-center mt-3 muted">
                Hesabın yok mu? <a th:href="@{/register}">Kayıt ol</a>
            </div>
        </div>

        <div class="foot">© <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2025</span> İsdemir</div>
    </div>
</div>
</body>
</html>
