<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - İsdemir</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body{
            background-image:url('/images/isdemir.jpg'); /* src/main/resources/static/images/isdemir.jpg */
            background-size:cover; background-repeat:no-repeat;
            background-position:center; background-attachment:fixed;
            min-height:100vh; font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
            display:flex; align-items:center; justify-content:center; margin:0;
        }
        .dashboard-box{
            background-color:rgba(255,255,255,.88); padding:40px; border-radius:16px;
            box-shadow:0 0 20px rgba(0,0,0,.30); text-align:center; width:min(100%,520px);
        }
        .btn-primary{ background-color:#c0392b; border:none; }
        .btn-primary:hover{ background-color:#e74c3c; }
        .btn-secondary{ border:none; }
        h2{ color:#2c3e50; margin-bottom:.25rem; }
        .muted{ color:#6c757d; font-size:.95rem; }
    </style>
</head>
<body>
<div class="dashboard-box">
    <h2>Hoş geldiniz, <span th:text="${username}">kullanıcı</span></h2>
    <div class="muted" th:if="${roles}">Rolleriniz: <span th:text="${roles}">ROLE_USER</span></div>
    <p class="mt-3">Bu sayfa sadece yetkili kullanıcılar içindir.</p>

    <div class="d-grid gap-2 mt-4">

        <a th:href="@{/products}" class="btn btn-primary">Ürün Listesine Git</a>

        <!-- Çıkış Yap (POST gerekir!) -->
        <form th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-secondary w-100">Çıkış Yap</button>
        </form>
    </div>
</div>
</body>
</html>
