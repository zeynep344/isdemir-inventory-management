<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - İsdemir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap (sadece grid ve reset için) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            --bg:#0c0d10; --card:#16181f; --accent:#22252f; --muted:#9aa0ab; --white:#fff;
            --red:#e11d2e; --red-2:#b3121f; --shadow:0 24px 60px rgba(0,0,0,.55); --radius:16px;
            --input:#10131a; --input-b:#2a3042;
        }
        html,body{ height:100%; background:var(--bg); color:var(--white); }
        .wrap{ min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
        .cardx{
            width:100%; max-width:460px; background:var(--card); border:1px solid var(--accent);
            border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
        }
        .head{ padding:22px 24px; border-bottom:1px solid var(--accent); }
        .title{ font-weight:800; font-size:22px; }
        .body{ padding:22px 24px 24px; }
        .form-label{ color:#e8ecf6; font-weight:600; }
        .form-control, .form-select{
            background:var(--input); color:#fff; border:1px solid var(--input-b);
            border-radius:12px; padding:.7rem .9rem;
        }
        .form-control:focus, .form-select:focus{ border-color:#3a4260; box-shadow:none; }
        .btn-red{
            width:100%; border:0; border-radius:12px; padding:.75rem 1rem; font-weight:800;
            background:linear-gradient(180deg,var(--red),var(--red-2)); color:#fff;
            box-shadow:0 10px 20px rgba(225,29,46,.35);
        }
        .muted{ color:var(--muted); }
        .alert-err{ background:rgba(225,29,46,.12); border:1px solid rgba(225,29,46,.35); color:#ff9aa3; }
        a{ color:#ff9aa3; text-decoration:none; } a:hover{ text-decoration:underline; }
        .foot{ padding:12px 24px 18px; text-align:center; color:var(--muted); font-size:.85rem; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="cardx">
        <div class="head"><div class="title">Kayıt Ol</div></div>

        <div class="body">
            <!-- Global hata (BindingResult reject) -->
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-err mb-3"
                 th:each="e : ${#fields.globalErrors()}" th:text="${e}"></div>

            <!-- Form -->
            <form th:action="@{/register}" th:object="${form}" method="post" novalidate>
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label" for="username">Kullanıcı Adı</label>
                    <input id="username" class="form-control" th:field="*{username}" required autocomplete="username">
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="pass">Şifre</label>
                    <!-- DİKKAT: alan adı 'pass' -->
                    <input id="pass" type="password" class="form-control" th:field="*{pass}" required autocomplete="new-password">
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('pass')}" th:errors="*{pass}"></div>
                    <div class="form-text muted">Şifreler güvenli biçimde (BCrypt) saklanır.</div>
                </div>

                <div class="mb-4">
                    <!-- register.html içindeki rol seçimi -->
                    <label class="form-label">Rol</label>
                    <select class="form-select" name="permission" required>
                        <option value="ADMIN">ADMIN</option>
                        <option value="OPERATOR">OPERATOR</option>
                        <option value="USER">USER</option> <!-- YENİ EKLENDİ -->
                    </select>

                    <div class="form-text text-danger" th:if="${#fields.hasErrors('permission')}" th:errors="*{permission}"></div>
                </div>

                <button class="btn-red" type="submit">Kayıt Ol</button>
            </form>

            <div class="text-center mt-3">
                <span class="muted">Zaten hesabın var mı?</span>
                <a th:href="@{/login-page}">Giriş yap</a>
            </div>
        </div>

        <div class="foot">© <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2025</span> İsdemir</div>
    </div>
</div>
</body>
</html>
